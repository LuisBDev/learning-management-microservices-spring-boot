version: "3.9"

services:
  identity-db-v1:
    image: postgres:16-alpine
    container_name: identity-db-v1
    environment:
      POSTGRES_DB: identitydb
      POSTGRES_USER: identityuser
      POSTGRES_PASSWORD: identitypass
    ports:
      - "41010:5432"
    volumes:
      - identity_db_data:/var/lib/postgresql/data
    networks:
      - lms-network

  course-db-v1:
    image: postgres:16-alpine
    container_name: course-db-v1
    environment:
      POSTGRES_DB: coursedb
      POSTGRES_USER: courseuser
      POSTGRES_PASSWORD: coursepass
    ports:
      - "41020:5432"
    volumes:
      - course_db_data:/var/lib/postgresql/data
    networks:
      - lms-network

  enrollment-db-v1:
    image: postgres:16-alpine
    container_name: enrollment-db-v1
    environment:
      POSTGRES_DB: enrollmentdb
      POSTGRES_USER: enrollmentuser
      POSTGRES_PASSWORD: enrollmentpass
    ports:
      - "41030:5432"
    volumes:
      - enrollment_db_data:/var/lib/postgresql/data
    networks:
      - lms-network

  learning-db-v1:
    image: postgres:16-alpine
    container_name: learning-db-v1
    environment:
      POSTGRES_DB: learningdb
      POSTGRES_USER: learninguser
      POSTGRES_PASSWORD: learningpass
    ports:
      - "41040:5432"
    volumes:
      - learning_db_data:/var/lib/postgresql/data
    networks:
      - lms-network

  prometheus-v1:
    image: prom/prometheus:latest
    container_name: prometheus-v1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lms-network

  grafana-v1:
    image: grafana/grafana:latest
    container_name: grafana-v1
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - lms-network

  jaeger-v1:
    image: jaegertracing/all-in-one:1.74.0
    container_name: jaeger-v1
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP (para los microservicios)
      - "4317:4317"    # OTLP gRPC (opcional)
    volumes:
      - jaeger_data:/tmp
    networks:
      - lms-network

  # Kafka with KRaft
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-kraft
    ports:
      - "9092:9092"
    environment:
      # KRaft mode configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # Listeners configuration
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      # Topic configuration
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Log configuration
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-kraft-data:/var/lib/kafka/data
    networks:
      - lms-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-kraft
    depends_on:
      - kafka
    ports:
      - "8055:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    volumes:
      - kafka-ui-kraft-data:/etc/kafkaui
    networks:
      - lms-network

volumes:
  identity_db_data:
  course_db_data:
  enrollment_db_data:
  learning_db_data:
  prometheus_data:
  grafana_data:
  jaeger_data:
  kafka-kraft-data:
  kafka-ui-kraft-data:

networks:
  lms-network:
    driver: bridge
