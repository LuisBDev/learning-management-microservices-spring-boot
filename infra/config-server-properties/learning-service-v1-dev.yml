spring:
  datasource:
    url: jdbc:postgresql://localhost:41040/learningdb
    username: learninguser
    password: learningpass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
