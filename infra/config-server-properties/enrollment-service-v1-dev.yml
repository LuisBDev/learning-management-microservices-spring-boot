spring:
  datasource:
    url: jdbc:postgresql://localhost:41030/enrollmentdb
    username: enrollmentuser
    password: enrollmentpass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
